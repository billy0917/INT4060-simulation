<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volume Explorer – Learn About Volume!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0ebe3;
    --clay-light: #faf7f2;
    --clay-mid: #ece6db;
    --shadow-out: 8px 8px 20px rgba(0,0,0,.10), -6px -6px 16px rgba(255,255,255,.7);
    --shadow-in: inset 4px 4px 10px rgba(0,0,0,.06), inset -4px -4px 10px rgba(255,255,255,.6);
    --shadow-btn: 4px 4px 12px rgba(0,0,0,.12), -3px -3px 8px rgba(255,255,255,.6);
    --accent: #7b7fc7;
    --accent-dark: #5c5fa8;
    --accent-light: #dddcf0;
    --green: #6da87e;
    --green-light: #e2efe6;
    --text: #3d3a36;
    --text-soft: #7a756d;
    --radius: 24px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    margin: 0;
    overflow: hidden;
  }

  /* ── Horizontal two-column layout ── */
  .layout {
    display: flex;
    height: 100vh;
    gap: 0;
  }
  .visual-panel {
    flex: 1 1 55%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    min-width: 0;
  }
  .info-panel {
    flex: 1 1 45%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 16px;
    overflow-y: auto;
    min-width: 0;
    gap: 10px;
  }

  h1 {
    font-size: clamp(1.2rem, 2.5vw, 1.6rem);
    font-weight: 800;
    color: var(--accent-dark);
    text-align: center;
    margin-bottom: 6px;
    letter-spacing: -.02em;
  }

  /* ── Shape Tabs ── */
  .tabs {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }
  .tab-btn {
    font-family: inherit;
    font-size: clamp(0.95rem, 3vw, 1.15rem);
    font-weight: 700;
    padding: 12px 28px;
    border: none;
    border-radius: 40px;
    background: var(--clay-light);
    color: var(--text-soft);
    box-shadow: var(--shadow-btn);
    cursor: pointer;
    transition: all .25s;
    min-height: 44px;
  }
  .tab-btn:hover { transform: translateY(-2px); }
  .tab-btn.active {
    background: var(--text);
    color: var(--clay-light);
    box-shadow: inset 3px 3px 8px rgba(0,0,0,.2), 2px 2px 8px rgba(0,0,0,.1);
  }

  /* ── Controls ── */
  .controls {
    background: var(--clay-light);
    border-radius: var(--radius);
    box-shadow: var(--shadow-out);
    padding: 14px 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    width: 100%;
  }
  .slider-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 110px;
    flex: 1;
    position: relative;
  }
  .slider-group label {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }
  .slider-group input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 14px;
    border-radius: 7px;
    background: var(--clay-mid);
    box-shadow: var(--shadow-in);
    outline: none;
    cursor: pointer;
  }
  .slider-group input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--accent);
    border: 4px solid var(--clay-light);
    box-shadow: var(--shadow-btn);
    cursor: grab;
  }
  .slider-group input[type=range]::-moz-range-thumb {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--accent);
    border: 4px solid var(--clay-light);
    box-shadow: var(--shadow-btn);
    cursor: grab;
  }
  .slider-val {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--accent-dark);
    margin-top: 4px;
  }

  /* ── Number buttons ── */
  .num-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-top: 8px;
  }
  .num-btn {
    font-family: inherit;
    font-size: .95rem;
    font-weight: 700;
    width: 38px; height: 38px;
    border: none;
    border-radius: 12px;
    background: var(--clay-mid);
    color: var(--text-soft);
    box-shadow: 2px 2px 6px rgba(0,0,0,.08), -2px -2px 4px rgba(255,255,255,.5);
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .num-btn:hover { transform: translateY(-1px); }
  .num-btn.active {
    background: var(--accent);
    color: var(--clay-light);
    box-shadow: inset 2px 2px 5px rgba(0,0,0,.15);
  }

  /* ── 3D Viewport ── */
  .viewport {
    background: var(--clay-light);
    border-radius: var(--radius);
    box-shadow: var(--shadow-out);
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .viewport canvas { display: block; width: 100% !important; height: auto !important; border-radius: var(--radius); }
  .drag-hint {
    position: absolute;
    bottom: 10px; left: 50%;
    transform: translateX(-50%);
    background: rgba(61,58,54,.55);
    color: var(--clay-light);
    font-family: inherit;
    font-size: .85rem;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 14px;
    pointer-events: none;
    opacity: 1;
    transition: opacity 1s;
  }

  /* ── Formula ── */
  .formula-box {
    background: var(--accent-light);
    border-radius: var(--radius);
    box-shadow: var(--shadow-in);
    padding: 12px 18px;
    text-align: center;
    width: 100%;
  }
  .formula-box .formula {
    font-size: clamp(1rem, 3vw, 1.35rem);
    color: var(--text);
    font-weight: 600;
  }
  .formula-box .result {
    font-size: clamp(1.4rem, 4.5vw, 2rem);
    color: var(--accent-dark);
    font-weight: 900;
    margin-top: 4px;
  }
  .hl-l { color: #c47a62; }
  .hl-w { color: #5a7bbf; }
  .hl-h { color: #6da87e; }

  /* ── Challenge ── */
  .challenge-box {
    background: var(--green-light);
    border-radius: var(--radius);
    box-shadow: var(--shadow-in);
    padding: 14px 18px;
    text-align: center;
    width: 100%;
  }
  .challenge-box .challenge-title {
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--green);
    margin-bottom: 6px;
  }
  .challenge-box .challenge-text {
    font-size: clamp(.95rem, 3vw, 1.2rem);
    color: var(--text);
    font-weight: 600;
  }
  .challenge-box .status { margin-top: 8px; font-size: 1.1rem; font-weight: 700; padding: 6px 16px; border-radius: 14px; display: inline-block; transition: all .35s ease; }
  .status-success { background: var(--green-light); color: var(--green); }
  .status-hint { background: var(--accent-light); color: var(--accent-dark); }
  .new-challenge-btn {
    font-family: inherit;
    margin-top: 12px;
    font-size: .95rem;
    font-weight: 700;
    padding: 10px 22px;
    border: none;
    border-radius: 40px;
    background: var(--clay-light);
    color: var(--green);
    box-shadow: var(--shadow-btn);
    cursor: pointer;
    transition: all .25s;
    min-height: 44px;
  }
  .new-challenge-btn:hover { transform: translateY(-2px); }
  .new-challenge-btn:active {
    box-shadow: var(--shadow-in);
    transform: translateY(0);
  }

  /* ── Confetti ── */
  .confetti-wrap {
    position: relative;
    display: inline-block;
    width: 100%;
  }
  .confetti-piece {
    position: absolute;
    width: 12px; height: 12px;
    border-radius: 4px;
    top: -8px; left: 50%;
    opacity: 0;
    pointer-events: none;
    animation: confettiFall 1.6s ease-out both;
  }
  @keyframes confettiFall {
    0%   { transform: translate3d(0, 0, 0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translate3d(var(--drift-x, 0px), 150px, 0) rotate(720deg) scale(0.35); opacity: 0; }
  }
  .challenge-box.celebrate {
    animation: celebratePulse .8s ease;
  }
  @keyframes celebratePulse {
    0%   { transform: scale(1); }
    35%  { transform: scale(1.06); box-shadow: 0 0 34px rgba(109,168,126,.5); }
    65%  { transform: scale(1.03); box-shadow: 0 0 20px rgba(109,168,126,.3); }
    100% { transform: scale(1); }
  }

  /* ── Onboarding hint ── */
  .onboard-hint {
    position: absolute;
    bottom: -48px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: var(--clay-light);
    font-family: inherit;
    font-size: .85rem;
    font-weight: 700;
    padding: 8px 18px;
    border-radius: 14px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    animation: hintBounce 1.8s ease-in-out infinite;
    z-index: 10;
  }
  .onboard-hint.show { opacity: 1; }
  @keyframes hintBounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(-6px); }
  }

  /* ── Drag hint enhanced ── */
  .drag-hint.pulse {
    animation: dragPulse 2s ease-in-out infinite;
  }
  @keyframes dragPulse {
    0%, 100% { opacity: .7; transform: translateX(-50%) scale(1); }
    50%      { opacity: 1; transform: translateX(-50%) scale(1.05); }
  }

  /* ── Responsive: fall back to vertical on narrow/mobile ── */
  @media (max-width: 700px) {
    body { height: auto; overflow: auto; }
    .layout { flex-direction: column; height: auto; }
    .visual-panel { flex: none; padding: 10px; }
    .info-panel { flex: none; padding: 10px; overflow-y: visible; }
  }
  @media (max-width: 360px) {
    .num-btn { width: 32px; height: 32px; font-size: .85rem; border-radius: 10px; }
  }

  /* ── Layer-by-layer button ── */
  .layer-btn {
    font-family: inherit;
    font-size: .95rem;
    font-weight: 700;
    padding: 10px 24px;
    border: none;
    border-radius: 40px;
    background: var(--clay-light);
    color: var(--accent-dark);
    box-shadow: var(--shadow-btn);
    cursor: pointer;
    transition: all .25s;
    min-height: 44px;
    margin-bottom: 12px;
  }
  .layer-btn:hover { transform: translateY(-2px); }
  .layer-btn:active { box-shadow: var(--shadow-in); transform: translateY(0); }
  .layer-btn.playing { background: var(--accent); color: var(--clay-light); }
  .layer-counter {
    font-size: .9rem;
    font-weight: 700;
    color: var(--accent-dark);
    text-align: center;
    min-height: 20px;
    margin-bottom: 8px;
  }

  /* ── Difficulty selector ── */
  .difficulty-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    width: 100%;
  }
  .diff-btn {
    font-family: inherit;
    font-size: .9rem;
    font-weight: 700;
    padding: 8px 20px;
    border: none;
    border-radius: 30px;
    background: var(--clay-light);
    color: var(--text-soft);
    box-shadow: var(--shadow-btn);
    cursor: pointer;
    transition: all .25s;
    min-height: 38px;
  }
  .diff-btn:hover { transform: translateY(-1px); }
  .diff-btn.active-easy { background: #a5d6a7; color: #2e7d32; box-shadow: var(--shadow-in); }
  .diff-btn.active-medium { background: #ffe082; color: #f57f17; box-shadow: var(--shadow-in); }
  .diff-btn.active-hard { background: #ef9a9a; color: #c62828; box-shadow: var(--shadow-in); }

  /* ── Formula tip ── */
  .formula-tip {
    font-size: .85rem;
    color: var(--text-soft);
    font-weight: 600;
    margin-top: 6px;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: all .3s;
  }
  .formula-tip.show { opacity: 1; max-height: 40px; }
</style>
</head>
<body>
<div class="layout">

  <!-- LEFT: 3D Visualization -->
  <div class="visual-panel">
    <div class="viewport" id="viewport">
      <div class="drag-hint" id="dragHint">Drag to rotate · Arrow keys to spin</div>
    </div>
    <div class="layer-counter" id="layerCounter"></div>
    <button class="layer-btn" id="layerBtn" onclick="startLayerByLayer()">Build Layer by Layer</button>
  </div>

  <!-- RIGHT: Controls + Info -->
  <div class="info-panel">
    <h1>Volume Explorer</h1>

    <div class="tabs">
      <button class="tab-btn active" data-shape="cuboid" onclick="setShape('cuboid')">Cuboid</button>
      <button class="tab-btn" data-shape="cube" onclick="setShape('cube')">Cube</button>
    </div>

    <div class="controls">
      <div class="slider-group">
        <label id="lenLabel" for="lenSlider">Length</label>
        <input type="range" id="lenSlider" min="1" max="8" value="4" aria-label="Length: 1 to 8" oninput="onInput()">
        <span class="slider-val" id="lenVal">4</span>
        <div class="num-btns" id="lenBtns"></div>
      </div>
      <div class="slider-group" id="wGroup">
        <label for="wSlider">Width</label>
        <input type="range" id="wSlider" min="1" max="8" value="3" aria-label="Width: 1 to 8" oninput="onInput()">
        <span class="slider-val" id="wVal">3</span>
        <div class="num-btns" id="wBtns"></div>
      </div>
      <div class="slider-group" id="hGroup">
        <label for="hSlider">Height</label>
        <input type="range" id="hSlider" min="1" max="8" value="2" aria-label="Height: 1 to 8" oninput="onInput()">
        <span class="slider-val" id="hVal">2</span>
        <div class="num-btns" id="hBtns"></div>
      </div>
    </div>

    <div class="formula-box">
      <div class="formula" id="formulaLine"></div>
      <div class="result" id="resultLine"></div>
      <div class="formula-tip" id="formulaTip"></div>
    </div>

    <div class="difficulty-bar">
      <button class="diff-btn active-easy" data-diff="easy" onclick="setDifficulty('easy')">Easy</button>
      <button class="diff-btn" data-diff="medium" onclick="setDifficulty('medium')">Medium</button>
      <button class="diff-btn" data-diff="hard" onclick="setDifficulty('hard')">Hard</button>
    </div>
    <div class="challenge-box">
      <div class="challenge-title">Challenge</div>
      <div class="challenge-text" id="challengeText"></div>
      <div class="status" id="challengeStatus" role="status" aria-live="polite"></div>
      <button class="new-challenge-btn" onclick="newChallenge()">New Challenge</button>
    </div>

  </div><!-- /info-panel -->
</div><!-- /layout -->

<!-- Three.js via ES module import map -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ── DOM refs ── */
const lenSlider = document.getElementById('lenSlider');
const wSlider   = document.getElementById('wSlider');
const hSlider   = document.getElementById('hSlider');
const lenVal    = document.getElementById('lenVal');
const wVal      = document.getElementById('wVal');
const hVal      = document.getElementById('hVal');
const wGroup    = document.getElementById('wGroup');
const hGroup    = document.getElementById('hGroup');
const lenLabel  = document.getElementById('lenLabel');
const lenBtns   = document.getElementById('lenBtns');
const wBtns     = document.getElementById('wBtns');
const hBtns     = document.getElementById('hBtns');
const formulaLine = document.getElementById('formulaLine');
const resultLine  = document.getElementById('resultLine');
const challengeText   = document.getElementById('challengeText');
const challengeStatus = document.getElementById('challengeStatus');
const viewportEl      = document.getElementById('viewport');
const dragHint        = document.getElementById('dragHint');
const layerBtn        = document.getElementById('layerBtn');
const layerCounter    = document.getElementById('layerCounter');
const formulaTip      = document.getElementById('formulaTip');

let currentShape = 'cuboid';
let targetVol = 0;
let targetConstraint = ''; // for hard mode: e.g. "one side must be 3"
let difficulty = 'easy';
let cubeGroup = null;
let labelGroup = null;
let groundPlane = null;
let animStartTime = 0;
let animRunning = false;
let layerByLayerMode = false;
let layerTimer = null;
let visibleLayers = 0;
let lastChallengeCorrect = false;
const challengeBox = document.querySelector('.challenge-box');

/* ── Sound FX (Web Audio API) ── */
const SFX = (() => {
  let ctx;
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  function getCtx() { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); return ctx; }
  function prime() {
    if (reducedMotion) return;
    try {
      const c = getCtx();
      if (c.state === 'suspended') c.resume();
    } catch(e) {}
  }
  function play(freq, freq2, dur, type = 'sine', vol = 0.12) {
    if (reducedMotion) return;
    try {
      const c = getCtx();
      if (c.state === 'suspended') {
        c.resume();
      }
      const o = c.createOscillator(), g = c.createGain();
      o.type = type; o.frequency.setValueAtTime(freq, c.currentTime);
      if (freq2) o.frequency.linearRampToValueAtTime(freq2, c.currentTime + dur);
      g.gain.setValueAtTime(vol, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
      o.connect(g); g.connect(c.destination);
      o.start(); o.stop(c.currentTime + dur);
    } catch(e) {}
  }
  return {
    prime,
    success() { play(523, 784, 0.35, 'sine', 0.25); },
    hint()    { play(330, 280, 0.15, 'triangle', 0.18); },
    tick()    { play(880, null, 0.05, 'sine', 0.13); }
  };
})();

['pointerdown', 'touchstart', 'keydown'].forEach(eventName => {
  window.addEventListener(eventName, () => SFX.prime(), { passive: true, once: false });
});

/* ── Colours per layer — bright child-friendly palette ── */
const layerColors = [
  0xff6b6b, // coral red
  0xff9f43, // orange
  0xffd32a, // sunny yellow
  0x26de81, // fresh green
  0x45aaf2, // sky blue
  0xa55eea, // purple
  0xfd79a8, // pink
  0x00d2d3, // teal
];

/* ── easing ── */
function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }

/* ── Three.js Setup ── */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xece6db);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
camera.position.set(8, 8, 14);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
viewportEl.insertBefore(renderer.domElement, dragHint);
renderer.domElement.setAttribute('role', 'img');
renderer.domElement.setAttribute('aria-label', 'Volume model showing unit cubes');

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.enablePan = false;
controls.minDistance = 5;
controls.maxDistance = 40;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.5;

let dragHintHidden = false;
let idleTimer = null;
function resetIdleTimer() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => {
    if (dragHintHidden) {
      dragHint.style.opacity = '1';
      dragHint.classList.add('pulse');
    }
  }, 15000);
}
controls.addEventListener('start', () => {
  controls.autoRotate = false;
  dragHint.style.opacity = '0';
  dragHint.classList.remove('pulse');
  dragHintHidden = true;
  resetIdleTimer();
});

const ambientLight = new THREE.AmbientLight(0xffffff, 0.75);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.85);
dirLight.position.set(10, 15, 10);
scene.add(dirLight);



/* ── Dimension Labels (Three.js Sprites) ── */
function createTextSprite(text, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 128; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.font = 'bold 48px Nunito, sans-serif';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 64, 32);
  const texture = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: texture, transparent: true });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(1.2, 0.6, 1);
  return sprite;
}

function updateDimensionLabels(l, w, h) {
  if (labelGroup) { scene.remove(labelGroup); }
  labelGroup = new THREE.Group();
  const offX = (l * (1 + gap)) / 2;
  const offY = (h * (1 + gap)) / 2;
  const offZ = (w * (1 + gap)) / 2;

  // L label (along X axis) — coral
  const lbl_L = createTextSprite('L=' + l, '#c47a62');
  lbl_L.position.set(0, -offY - 0.8, offZ + 0.8);
  labelGroup.add(lbl_L);

  // W label (along Z axis) — blue
  const lbl_W = createTextSprite('W=' + w, '#5a7bbf');
  lbl_W.position.set(offX + 0.8, -offY - 0.8, 0);
  labelGroup.add(lbl_W);

  // H label (along Y axis) — green
  const lbl_H = createTextSprite('H=' + h, '#6da87e');
  lbl_H.position.set(offX + 0.8, 0, offZ + 0.8);
  labelGroup.add(lbl_H);

  scene.add(labelGroup);
}

/* ── Keyboard Controls ── */
document.addEventListener('keydown', (e) => {
  const speed = 0.08;
  let handled = false;
  if (e.key === 'ArrowLeft')  { controls.autoRotate = false; camera.position.applyAxisAngle(new THREE.Vector3(0,1,0), speed); handled = true; }
  if (e.key === 'ArrowRight') { controls.autoRotate = false; camera.position.applyAxisAngle(new THREE.Vector3(0,1,0), -speed); handled = true; }
  if (e.key === 'ArrowUp')    { controls.autoRotate = false; camera.position.y += 0.5; handled = true; }
  if (e.key === 'ArrowDown')  { controls.autoRotate = false; camera.position.y -= 0.5; handled = true; }
  if (handled) { camera.lookAt(0, 0, 0); controls.update(); e.preventDefault(); }
});

/* ── Resize ── */
function resizeViewport() {
  const w = viewportEl.clientWidth;
  const h = Math.round(w * 0.85);
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resizeViewport);
resizeViewport();

/* ── Build cubes ── */
function getL() { return parseInt(lenSlider.value); }
function getW() { return currentShape === 'cube' ? getL() : parseInt(wSlider.value); }
function getH() { return currentShape === 'cube' ? getL() : parseInt(hSlider.value); }

const gap = 0.06;
const cubeSize = 0.92;
const edgeMat = new THREE.LineBasicMaterial({ color: 0x3d3a36, linewidth: 1 });

/* Animation timing constants */
const CUBE_DURATION = 250;       // ms per cube to fully scale in
const STAGGER_WITHIN_LAYER = 25; // ms between cubes in same layer
const LAYER_GAP = 300;           // extra ms gap between layers

function buildScene() {
  if (cubeGroup) { scene.remove(cubeGroup); }
  cubeGroup = new THREE.Group();

  const l = getL(), w = getW(), h = getH();
  const offX = -(l - 1) / 2;
  const offY = -(h - 1) / 2;
  const offZ = -(w - 1) / 2;
  const cubesPerLayer = l * w;

  let cubeIndex = 0;
  for (let y = 0; y < h; y++) {
    for (let z = 0; z < w; z++) {
      for (let x = 0; x < l; x++) {
        const colorIdx = y % layerColors.length;
        const mat = new THREE.MeshPhongMaterial({
          color: layerColors[colorIdx],
          transparent: true,
          opacity: 0,
          shininess: 90
        });
        const geom = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
        const mesh = new THREE.Mesh(geom, mat);

        const targetPos = new THREE.Vector3(
          offX + x * (1 + gap),
          offY + y * (1 + gap),
          offZ + z * (1 + gap)
        );
        mesh.position.copy(targetPos);
        mesh.scale.set(0, 0, 0);

        // compute stagger delay — layer-by-layer build
        const indexInLayer = cubeIndex - y * cubesPerLayer;
        const delay = y * (cubesPerLayer * STAGGER_WITHIN_LAYER + LAYER_GAP) + indexInLayer * STAGGER_WITHIN_LAYER;

        mesh.userData = {
          layer: y,
          targetPos,
          delay,
          startY: targetPos.y - 0.6 // start slightly below
        };

        const edgesGeom = new THREE.EdgesGeometry(geom);
        const line = new THREE.LineSegments(edgesGeom, edgeMat.clone());
        line.material.transparent = true;
        line.material.opacity = 0;
        mesh.add(line);

        cubeGroup.add(mesh);
        cubeIndex++;
      }
    }
  }
  scene.add(cubeGroup);

  // Dimension labels
  updateDimensionLabels(l, w, h);

  // Camera framing
  const maxDim = Math.max(l, w, h);
  camera.position.set(maxDim * 1.2, maxDim * 1.2, maxDim * 2);
  controls.target.set(0, 0, 0);
  controls.update();

  // Reset layer-by-layer state
  layerByLayerMode = false;
  if (layerTimer) { clearInterval(layerTimer); layerTimer = null; }
  layerBtn.classList.remove('playing');
  layerBtn.textContent = 'Build Layer by Layer';
  layerCounter.textContent = '';

  // Start emergence animation
  animStartTime = performance.now();
  animRunning = true;
}

function setShape(shape) {
  currentShape = shape;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.shape === shape));
  if (shape === 'cube') {
    wGroup.style.display = 'none';
    hGroup.style.display = 'none';
    lenLabel.textContent = 'Side Length';
    lenSlider.max = 6;
    if (parseInt(lenSlider.value) > 6) lenSlider.value = 6;
    renderNumBtns(lenBtns, 1, 6, lenSlider);
  } else {
    wGroup.style.display = '';
    hGroup.style.display = '';
    lenLabel.textContent = 'Length';
    lenSlider.max = 8;
    renderNumBtns(lenBtns, 1, 8, lenSlider);
  }
  onInput();
}

let initDone = false;

function onInput() {
  if (initDone) dismissHint();
  if (initDone) SFX.tick();
  resetIdleTimer();
  const l = getL(), w = getW(), h = getH();
  lenVal.textContent = l;
  wVal.textContent = currentShape === 'cube' ? l : w;
  hVal.textContent = currentShape === 'cube' ? l : h;
  highlightNumBtns(lenBtns, l);
  highlightNumBtns(wBtns, currentShape === 'cube' ? l : w);
  highlightNumBtns(hBtns, currentShape === 'cube' ? l : h);
  renderer.domElement.setAttribute('aria-label', `Volume model showing ${l} by ${w} by ${h} = ${l*w*h} unit cubes`);
  buildScene();
  updateFormula(l, w, h);
  checkChallenge(l, w, h);
}

function updateFormula(l, w, h) {
  const vol = l * w * h;
  if (currentShape === 'cube') {
    formulaLine.innerHTML = `Volume = <span class="hl-l">${l}</span> × <span class="hl-l">${l}</span> × <span class="hl-l">${l}</span>`;
    formulaTip.textContent = `${l} × ${l} = ${l*l} cubes per layer × ${l} layers = ${vol}`;
  } else {
    formulaLine.innerHTML = `Volume = <span class="hl-l">${l}</span> × <span class="hl-w">${w}</span> × <span class="hl-h">${h}</span>`;
    formulaTip.textContent = `${l} × ${w} = ${l*w} cubes per layer × ${h} layers = ${vol}`;
  }
  resultLine.textContent = `= ${vol} unit cubes`;
  formulaTip.classList.add('show');
}

/* animate the result counter */
function updateFormulaAnimated(l, w, h, elapsed) {
  const total = l * w * h;
  if (!cubeGroup) return;
  const lastDelay = Math.max(...cubeGroup.children.map(m => m.userData.delay)) + CUBE_DURATION;
  const progress = lastDelay > 0 ? Math.min(1, elapsed / lastDelay) : 1;
  const displayCount = Math.round(easeOutQuart(progress) * total);

  if (currentShape === 'cube') {
    formulaLine.innerHTML = `Volume = <span class="hl-l">${l}</span> × <span class="hl-l">${l}</span> × <span class="hl-l">${l}</span>`;
  } else {
    formulaLine.innerHTML = `Volume = <span class="hl-l">${l}</span> × <span class="hl-w">${w}</span> × <span class="hl-h">${h}</span>`;
  }
  resultLine.textContent = `= ${displayCount} unit cubes`;
}

/* ── Layer by Layer ── */
function startLayerByLayer() {
  if (layerByLayerMode) {
    // Stop it
    clearInterval(layerTimer); layerTimer = null;
    layerByLayerMode = false;
    layerBtn.classList.remove('playing');
    layerBtn.textContent = 'Build Layer by Layer';
    layerCounter.textContent = '';
    // Show all cubes fully
    if (cubeGroup) cubeGroup.children.forEach(m => {
      m.scale.setScalar(1); m.material.opacity = 1;
      m.position.y = m.userData.targetPos.y;
      if (m.children[0]) m.children[0].material.opacity = 1;
    });
    animRunning = false;
    return;
  }

  layerByLayerMode = true;
  layerBtn.classList.add('playing');
  layerBtn.textContent = 'Stop';
  visibleLayers = 0;
  const l = getL(), w = getW(), h = getH();
  const cubesPerLayer = l * w;

  // Hide all cubes first
  if (cubeGroup) cubeGroup.children.forEach(m => {
    m.scale.setScalar(0); m.material.opacity = 0;
    if (m.children[0]) m.children[0].material.opacity = 0;
  });
  animRunning = false;
  layerCounter.textContent = `Layer 0 / ${h}`;

  layerTimer = setInterval(() => {
    if (visibleLayers >= h) {
      clearInterval(layerTimer); layerTimer = null;
      layerByLayerMode = false;
      layerBtn.classList.remove('playing');
      layerBtn.textContent = 'Build Layer by Layer';
      layerCounter.textContent = `All ${h} layers shown! Total = ${l * w * h} cubes`;
      return;
    }
    // Reveal next layer
    if (cubeGroup) {
      cubeGroup.children.forEach(m => {
        if (m.userData.layer === visibleLayers) {
          m.scale.setScalar(1); m.material.opacity = 1;
          m.position.y = m.userData.targetPos.y;
          if (m.children[0]) m.children[0].material.opacity = 1;
        }
      });
    }
    visibleLayers++;
    layerCounter.textContent = `Layer ${visibleLayers} / ${h} — ${visibleLayers * cubesPerLayer} cubes so far`;
  }, 1200);
}

/* ── Difficulty System ── */
function setDifficulty(diff) {
  difficulty = diff;
  document.querySelectorAll('.diff-btn').forEach(b => {
    b.className = 'diff-btn';
    if (b.dataset.diff === diff) b.classList.add('active-' + diff);
  });
  newChallenge();
}

/* ── Challenge ── */
function newChallenge() {
  lastChallengeCorrect = false;
  targetConstraint = '';

  if (difficulty === 'easy') {
    const vols = [6, 8, 10, 12, 16, 18];
    targetVol = vols[Math.floor(Math.random() * vols.length)];
    challengeText.textContent = `Can you make a shape with volume = ${targetVol}?`;
  } else if (difficulty === 'medium') {
    const vols = [12, 16, 18, 20, 24, 27, 30, 36];
    targetVol = vols[Math.floor(Math.random() * vols.length)];
    challengeText.textContent = `Can you make a shape with volume = ${targetVol}?`;
  } else {
    // Hard: volume + constraint
    const combos = [
      { v: 24, c: 'height must be 3' }, { v: 24, c: 'width must be 4' },
      { v: 30, c: 'length must be 5' }, { v: 36, c: 'height must be 4' },
      { v: 12, c: 'height must be 2' }, { v: 18, c: 'width must be 3' },
      { v: 27, c: 'all sides equal' },  { v: 8, c: 'all sides equal' },
    ];
    const pick = combos[Math.floor(Math.random() * combos.length)];
    targetVol = pick.v;
    targetConstraint = pick.c;
    challengeText.textContent = `Volume = ${targetVol} AND ${targetConstraint}`;
  }

  challengeStatus.textContent = '';
  challengeStatus.className = 'status';
  checkChallenge(getL(), getW(), getH());
}

function checkConstraint(l, w, h) {
  if (!targetConstraint) return true;
  if (targetConstraint === 'all sides equal') return l === w && w === h;
  if (targetConstraint.includes('height must be')) return h === parseInt(targetConstraint.match(/\d+/)[0]);
  if (targetConstraint.includes('width must be')) return w === parseInt(targetConstraint.match(/\d+/)[0]);
  if (targetConstraint.includes('length must be')) return l === parseInt(targetConstraint.match(/\d+/)[0]);
  return true;
}

function checkChallenge(l, w, h) {
  if (!targetVol) return;
  const vol = l * w * h;
  const volOk = vol === targetVol;
  const conOk = checkConstraint(l, w, h);

  if (volOk && conOk) {
    challengeStatus.textContent = 'Well done!';
    challengeStatus.className = 'status status-success';
    if (!lastChallengeCorrect) { SFX.success(); spawnConfetti(); celebratePulse(); }
    lastChallengeCorrect = true;
  } else {
    let hints = [];
    if (!volOk) hints.push(vol < targetVol ? 'Volume: need more!' : 'Volume: too much!');
    if (!conOk) hints.push('Constraint not met');
    if (!lastChallengeCorrect && challengeStatus.textContent !== '') SFX.hint();
    challengeStatus.textContent = hints.join(' · ') || 'Keep trying!';
    challengeStatus.className = 'status status-hint';
    lastChallengeCorrect = false;
  }
}

/* ── Confetti ── */
const confettiColors = ['#ff6b6b','#ff9f43','#ffd32a','#26de81','#45aaf2','#a55eea','#fd79a8','#00d2d3'];
function spawnConfetti() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  for (let i = 0; i < 32; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.background = confettiColors[i % confettiColors.length];
    el.style.left = (20 + Math.random() * 60) + '%';
    el.style.setProperty('--drift-x', `${-70 + Math.random() * 140}px`);
    el.style.animationDelay = (Math.random() * 0.3) + 's';
    el.style.animationDuration = (1.2 + Math.random() * 0.8) + 's';
    challengeBox.style.position = 'relative';
    challengeBox.style.overflow = 'visible';
    challengeBox.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }
}
function celebratePulse() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  challengeBox.classList.remove('celebrate');
  void challengeBox.offsetWidth;
  challengeBox.classList.add('celebrate');
  setTimeout(() => challengeBox.classList.remove('celebrate'), 600);
}

/* ── Number button helpers ── */
function renderNumBtns(container, min, max, slider) {
  const label = slider === lenSlider ? (currentShape === 'cube' ? 'side length' : 'length')
              : slider === wSlider ? 'width' : 'height';
  container.innerHTML = '';
  for (let i = min; i <= max; i++) {
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.textContent = i;
    btn.setAttribute('aria-label', `Set ${label} to ${i}`);
    btn.addEventListener('click', () => {
      slider.value = i;
      onInput();
    });
    container.appendChild(btn);
  }
}
function highlightNumBtns(container, val) {
  container.querySelectorAll('.num-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.textContent) === val);
  });
}

/* ── Onboarding hint ── */
let hintEl = null;
function dismissHint() {
  if (hintEl) { hintEl.remove(); hintEl = null; }
}
function showHint() {
  const group = document.querySelector('.slider-group');
  hintEl = document.createElement('div');
  hintEl.className = 'onboard-hint';
  hintEl.textContent = 'Drag the slider or tap a number!';
  group.appendChild(hintEl);
  requestAnimationFrame(() => hintEl.classList.add('show'));
  setTimeout(dismissHint, 5000);
}

/* ── Expose to global for inline onclick handlers ── */
window.setShape = setShape;
window.onInput = onInput;
window.newChallenge = newChallenge;
window.startLayerByLayer = startLayerByLayer;
window.setDifficulty = setDifficulty;

/* ── Render loop with emergence animation ── */
function tick() {
  requestAnimationFrame(tick);

  if (animRunning && cubeGroup) {
    const elapsed = performance.now() - animStartTime;
    let allDone = true;

    for (const mesh of cubeGroup.children) {
      const d = mesh.userData;
      const t = Math.max(0, elapsed - d.delay);
      const progress = Math.min(1, t / CUBE_DURATION);
      const ease = easeOutQuart(progress);

      mesh.scale.setScalar(ease);
      mesh.material.opacity = ease;
      mesh.position.y = d.startY + (d.targetPos.y - d.startY) * ease;

      // fade edges in
      if (mesh.children[0]) {
        mesh.children[0].material.opacity = ease;
      }

      if (progress < 1) allDone = false;
    }

    // animate counter
    const l = getL(), w = getW(), h = getH();
    updateFormulaAnimated(l, w, h, elapsed);

    if (allDone) {
      animRunning = false;
      updateFormula(l, w, h); // final exact number
    }
  }

  controls.update();
  renderer.render(scene, camera);
}
tick();

/* ── Init ── */
renderNumBtns(lenBtns, 1, 8, lenSlider);
renderNumBtns(wBtns, 1, 8, wSlider);
renderNumBtns(hBtns, 1, 8, hSlider);
onInput();
newChallenge();
initDone = true;
showHint();
</script>
</body>
