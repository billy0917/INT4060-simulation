<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volume Explorer – Learn About Volume!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Comic Sans MS', Arial, sans-serif;
    background: linear-gradient(135deg, #d1c4e9 0%, #b3e5fc 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
    overflow-x: hidden;
  }

  h1 {
    font-size: clamp(1.3rem, 4vw, 1.9rem);
    color: #4527a0;
    text-align: center;
    margin-bottom: 6px;
    text-shadow: 1px 1px 0 #fff;
  }

  /* ── Shape Tabs ── */
  .tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  .tab-btn {
    font-size: clamp(0.95rem, 3vw, 1.2rem);
    padding: 9px 24px;
    border: 3px solid #4527a0;
    border-radius: 30px;
    background: #fff;
    color: #4527a0;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
  }
  .tab-btn.active, .tab-btn:hover {
    background: #4527a0;
    color: #fff;
  }

  /* ── Controls ── */
  .controls {
    background: #fff;
    border-radius: 18px;
    padding: 14px 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,.1);
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
    margin-bottom: 10px;
    max-width: 600px;
    width: 100%;
  }
  .slider-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 110px;
    flex: 1;
  }
  .slider-group label {
    font-size: 1rem;
    font-weight: 600;
    color: #333;
    margin-bottom: 2px;
  }
  .slider-group input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 12px;
    border-radius: 6px;
    background: linear-gradient(90deg, #b39ddb, #4527a0);
    outline: none;
    cursor: pointer;
  }
  .slider-group input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #4527a0;
    border: 3px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
    cursor: grab;
  }
  .slider-group input[type=range]::-moz-range-thumb {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #4527a0;
    border: 3px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
    cursor: grab;
  }
  .slider-val {
    font-size: 1.4rem;
    font-weight: 800;
    color: #4527a0;
    margin-top: 1px;
  }

  /* ── 3D Viewport ── */
  .viewport {
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 4px 20px rgba(0,0,0,.1);
    margin-bottom: 10px;
    max-width: 600px;
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .viewport canvas { display: block; width: 100% !important; height: auto !important; border-radius: 18px; }
  .drag-hint {
    position: absolute;
    bottom: 8px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,.45);
    color: #fff;
    font-size: .8rem;
    padding: 4px 14px;
    border-radius: 12px;
    pointer-events: none;
    opacity: 1;
    transition: opacity 1s;
  }

  /* ── Formula ── */
  .formula-box {
    background: #ede7f6;
    border: 3px solid #4527a0;
    border-radius: 18px;
    padding: 12px 24px;
    text-align: center;
    max-width: 600px;
    width: 100%;
    box-shadow: 0 4px 20px rgba(0,0,0,.08);
  }
  .formula-box .formula {
    font-size: clamp(1rem, 3vw, 1.35rem);
    color: #333;
    font-weight: 600;
  }
  .formula-box .result {
    font-size: clamp(1.4rem, 4.5vw, 2rem);
    color: #4527a0;
    font-weight: 900;
    margin-top: 2px;
  }
  .hl-l { color: #d32f2f; }
  .hl-w { color: #1565c0; }
  .hl-h { color: #2e7d32; }

  /* ── Challenge ── */
  .challenge-box {
    margin-top: 10px;
    background: #fff8e1;
    border: 3px solid #f9a825;
    border-radius: 18px;
    padding: 12px 20px;
    text-align: center;
    max-width: 600px;
    width: 100%;
    box-shadow: 0 4px 20px rgba(0,0,0,.06);
  }
  .challenge-box .challenge-title { font-size: 1.1rem; font-weight: 700; color: #f57f17; margin-bottom: 4px; }
  .challenge-box .challenge-text { font-size: clamp(.95rem, 3vw, 1.2rem); color: #333; font-weight: 600; }
  .challenge-box .status { margin-top: 6px; font-size: 1.4rem; }
  .new-challenge-btn {
    margin-top: 8px;
    font-size: .95rem;
    padding: 7px 20px;
    border: 2px solid #f9a825;
    border-radius: 20px;
    background: #fff;
    color: #f57f17;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
  }
  .new-challenge-btn:hover { background: #f9a825; color: #fff; }

  /* ── Build-layer toggle ── */
  .toggle-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 10px;
  }
  .toggle-btn {
    font-size: .9rem;
    padding: 7px 18px;
    border: 2px solid #4527a0;
    border-radius: 18px;
    background: #fff;
    color: #4527a0;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .toggle-btn.active, .toggle-btn:hover { background: #4527a0; color: #fff; }
</style>
</head>
<body>

<h1>📦 Volume Explorer</h1>

<div class="tabs">
  <button class="tab-btn active" data-shape="cuboid" onclick="setShape('cuboid')">Cuboid</button>
  <button class="tab-btn" data-shape="cube" onclick="setShape('cube')">Cube</button>
</div>

<div class="controls">
  <div class="slider-group">
    <label id="lenLabel">Length</label>
    <input type="range" id="lenSlider" min="1" max="8" value="4" oninput="onInput()">
    <span class="slider-val" id="lenVal">4</span>
  </div>
  <div class="slider-group" id="wGroup">
    <label>Width</label>
    <input type="range" id="wSlider" min="1" max="8" value="3" oninput="onInput()">
    <span class="slider-val" id="wVal">3</span>
  </div>
  <div class="slider-group" id="hGroup">
    <label>Height</label>
    <input type="range" id="hSlider" min="1" max="8" value="2" oninput="onInput()">
    <span class="slider-val" id="hVal">2</span>
  </div>
</div>

<div class="toggle-row">
  <button class="toggle-btn active" id="btnSolid" onclick="setView('solid')">Solid</button>
  <button class="toggle-btn" id="btnBuild" onclick="setView('build')">Build Layer by Layer</button>
</div>

<div class="viewport" id="viewport">
  <div class="drag-hint" id="dragHint">🖱️ Drag to rotate</div>
</div>

<div class="formula-box">
  <div class="formula" id="formulaLine"></div>
  <div class="result" id="resultLine"></div>
</div>

<div class="challenge-box">
  <div class="challenge-title">🎯 Challenge</div>
  <div class="challenge-text" id="challengeText"></div>
  <div class="status" id="challengeStatus"></div>
  <button class="new-challenge-btn" onclick="newChallenge()">New Challenge</button>
</div>

<!-- Three.js via ES module import map -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ── DOM refs ── */
const lenSlider = document.getElementById('lenSlider');
const wSlider   = document.getElementById('wSlider');
const hSlider   = document.getElementById('hSlider');
const lenVal    = document.getElementById('lenVal');
const wVal      = document.getElementById('wVal');
const hVal      = document.getElementById('hVal');
const wGroup    = document.getElementById('wGroup');
const hGroup    = document.getElementById('hGroup');
const lenLabel  = document.getElementById('lenLabel');
const formulaLine = document.getElementById('formulaLine');
const resultLine  = document.getElementById('resultLine');
const challengeText   = document.getElementById('challengeText');
const challengeStatus = document.getElementById('challengeStatus');
const viewportEl      = document.getElementById('viewport');
const dragHint        = document.getElementById('dragHint');

let currentShape = 'cuboid';
let viewMode = 'solid'; // 'solid' | 'build'
let targetVol = 0;
let cubeGroup = null;
let buildProgress = 0;
let buildTimer = null;

/* ── Colours per layer ── */
const layerColors = [
  0xFF7043, 0xFFA726, 0xFFEE58, 0x66BB6A,
  0x26C6DA, 0x42A5F5, 0x7E57C2, 0xEC407A
];

/* ── Three.js Setup ── */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf5f5f5);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
camera.position.set(8, 8, 14);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
viewportEl.insertBefore(renderer.domElement, dragHint);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.enablePan = false;
controls.minDistance = 5;
controls.maxDistance = 40;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.5;

// Stop auto-rotate on interaction
controls.addEventListener('start', () => {
  controls.autoRotate = false;
  dragHint.style.opacity = '0';
});

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
dirLight.position.set(10, 15, 10);
scene.add(dirLight);

/* ── Resize ── */
function resizeViewport() {
  const w = viewportEl.clientWidth;
  const h = Math.round(w * 0.7);
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resizeViewport);
resizeViewport();

/* ── Build cubes ── */
function getL() { return parseInt(lenSlider.value); }
function getW() { return currentShape === 'cube' ? getL() : parseInt(wSlider.value); }
function getH() { return currentShape === 'cube' ? getL() : parseInt(hSlider.value); }

const gap = 0.06;
const cubeSize = 0.92;
const edgeMat = new THREE.LineBasicMaterial({ color: 0x333333, linewidth: 1 });

function buildScene() {
  if (cubeGroup) { scene.remove(cubeGroup); }
  cubeGroup = new THREE.Group();

  const l = getL(), w = getW(), h = getH();
  const offX = -(l - 1) / 2;
  const offY = -(h - 1) / 2;
  const offZ = -(w - 1) / 2;

  for (let y = 0; y < h; y++) {
    for (let z = 0; z < w; z++) {
      for (let x = 0; x < l; x++) {
        const colorIdx = y % layerColors.length;
        const mat = new THREE.MeshPhongMaterial({
          color: layerColors[colorIdx],
          transparent: true,
          opacity: 1,
          shininess: 40
        });
        const geom = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
        const mesh = new THREE.Mesh(geom, mat);
        mesh.position.set(
          offX + x * (1 + gap),
          offY + y * (1 + gap),
          offZ + z * (1 + gap)
        );
        mesh.userData.layer = y;

        // edges
        const edgesGeom = new THREE.EdgesGeometry(geom);
        const line = new THREE.LineSegments(edgesGeom, edgeMat);
        mesh.add(line);

        cubeGroup.add(mesh);
      }
    }
  }
  scene.add(cubeGroup);

  // Camera framing
  const maxDim = Math.max(l, w, h);
  camera.position.set(maxDim * 1.2, maxDim * 1.2, maxDim * 2);
  controls.target.set(0, 0, 0);
  controls.update();

  if (viewMode === 'build') startBuildAnim(h);
  else showAllLayers();
}

function showAllLayers() {
  if (!cubeGroup) return;
  cubeGroup.children.forEach(m => {
    m.visible = true;
    m.material.opacity = 1;
  });
}

function startBuildAnim(totalLayers) {
  if (buildTimer) clearInterval(buildTimer);
  buildProgress = 0;
  cubeGroup.children.forEach(m => { m.visible = false; m.material.opacity = 0; });
  buildTimer = setInterval(() => {
    cubeGroup.children.forEach(m => {
      if (m.userData.layer <= buildProgress) {
        m.visible = true;
        m.material.opacity = 1;
      }
    });
    buildProgress++;
    if (buildProgress >= totalLayers) clearInterval(buildTimer);
  }, 600);
}

function setShape(shape) {
  currentShape = shape;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.shape === shape));
  if (shape === 'cube') {
    wGroup.style.display = 'none';
    hGroup.style.display = 'none';
    lenLabel.textContent = 'Side Length';
    lenSlider.max = 6;
    if (parseInt(lenSlider.value) > 6) lenSlider.value = 6;
  } else {
    wGroup.style.display = '';
    hGroup.style.display = '';
    lenLabel.textContent = 'Length';
    lenSlider.max = 8;
  }
  onInput();
}

function setView(mode) {
  viewMode = mode;
  document.getElementById('btnSolid').classList.toggle('active', mode === 'solid');
  document.getElementById('btnBuild').classList.toggle('active', mode === 'build');
  buildScene();
}

function onInput() {
  const l = getL(), w = getW(), h = getH();
  lenVal.textContent = l;
  wVal.textContent = currentShape === 'cube' ? l : w;
  hVal.textContent = currentShape === 'cube' ? l : h;
  buildScene();
  updateFormula(l, w, h);
  checkChallenge(l, w, h);
}

function updateFormula(l, w, h) {
  const vol = l * w * h;
  if (currentShape === 'cube') {
    formulaLine.innerHTML = `Volume = <span class="hl-l">${l}</span> × <span class="hl-l">${l}</span> × <span class="hl-l">${l}</span>`;
  } else {
    formulaLine.innerHTML = `Volume = <span class="hl-l">${l}</span> × <span class="hl-w">${w}</span> × <span class="hl-h">${h}</span>`;
  }
  resultLine.textContent = `= ${vol} unit cubes`;
}

/* ── Challenge ── */
function newChallenge() {
  const vols = [6, 8, 10, 12, 16, 18, 20, 24, 27, 30];
  targetVol = vols[Math.floor(Math.random() * vols.length)];
  challengeText.textContent = `Can you make a shape with volume = ${targetVol}?`;
  challengeStatus.textContent = '';
  checkChallenge(getL(), getW(), getH());
}
function checkChallenge(l, w, h) {
  if (!targetVol) return;
  const vol = l * w * h;
  if (vol === targetVol) challengeStatus.textContent = '🎉 You got it!';
  else challengeStatus.textContent = vol < targetVol ? '⬆️ Need more!' : '⬇️ Too much!';
}

/* ── Expose to global for inline onclick handlers ── */
window.setShape = setShape;
window.setView = setView;
window.onInput = onInput;
window.newChallenge = newChallenge;

/* ── Render loop ── */
function tick() {
  requestAnimationFrame(tick);
  controls.update();
  renderer.render(scene, camera);
}
tick();

/* ── Init ── */
onInput();
newChallenge();
</script>
</body>
</html>
